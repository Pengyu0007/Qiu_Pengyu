<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Mi web </title>
			<!--estilos que aplicare a mi pagina-->
		<style>
				
				body {
					background-color:#DEDCDC;
					
				}
				
				h1 {
					font-family: Consolas, "Andale Mono", "Lucida Console", "Lucida Sans Typewriter", Monaco, "Courier New", "monospace";
				}
				p {
					font-family: Consolas, "Andale Mono", "Lucida Console", "Lucida Sans Typewriter", Monaco, "Courier New", "monospace";
					
				}
				img{
					width: 100%;
					
				}
				
				.header{
					background-color:purple;
					color: white;
					text-align:center;
					padding:6px;
					
				}
				
				.item{ 
					width: 25%
				
				}
				
				.image{
					background-color: white;
					padding: 10px;
				}
				.item img{
					
				}
				
				.text{
					background-color: green;
					font-size: 12px;
					padding: 4px 2px 6px 4px;
				}
			.text text{
					margin: 0px;
			}
				.footer{
					background-color: black;
					color: white;
					text-align: center;
					font-size: 1em;
			}

	</head>

	<body>

			<h1>Practicando con css</h1>
		</div>
			<div class="content">
			
			<!--Comienzo del item-->
			<div class="item">
				<div class="image">
					<img src="koala-arbol.jpg" alt="Koala">
				</div>
				<div class="test">
					<p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Autem ipsa quam, ea!
					</p>
				</div>
			</div>
			
			
			<!--Fin del item-->

		<div class="footer">
			<h>Este es el piel de pagina</h>
		
		</div>

</html>
